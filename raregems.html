<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="Rare Disease Club" content="Rare Gems – Rare Disease Club" />
  <link rel="icon" href="rdc.png" type="image/png" />
  <title>Rare Gems – Rare Disease Club</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');

    /* --- Base --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background-color: #fce8f5;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* --- Banner --- */
    .full-width-banner {
      width: 100vw;
      background-color: #fce8f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px 0;
    }
    .full-width-banner img { width: 100%; max-width: 100%; height: auto; display: block; }

    /* --- NAVIGATION --- */
    nav {
      background-color: #fce8f5;
      border-top: 3px solid black;
      border-bottom: 3px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      min-height: 72px;
      width: 100%;
      padding: 0;
    }
    .home-btn, .nav-links a, .dropdown-toggle {
      text-decoration: none;
      color: black;
      font-size: 1.35rem;
      font-weight: bold;
      font-family: 'Georgia', serif;
      text-transform: uppercase;
      transition: all 0.3s ease;
      padding: 0 32px;
      height: 72px;
      line-height: 72px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .home-btn.active {
      background: white;
      border: 3px solid black;
      border-radius: 24px;
      padding: 0 32px;
      height: 56px;
      line-height: 56px;
      margin-left: 12px;
      font-size: 1.2rem;
    }
    .nav-links { display: flex; gap: 0; align-items: center; height: 72px; }
    .nav-links a.active { color: #B96794; }
    .dropdown { position: relative; display: flex; align-items: center; height: 72px; }
    .dropdown-toggle:after { content: ' ▼'; font-size: 0.8em; margin-left: 2px; }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 180px;
      background-color: #111;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.15);
      z-index: 99;
    }
    .dropdown-menu a {
      color: #fff;
      padding: 16px 26px;
      font-size: 1.15rem;
      border-bottom: 1px solid #222;
      display: block;
      height: auto;
      line-height: 1.6;
    }
    .dropdown-menu a:hover { background: #B96794; }
    .dropdown:hover .dropdown-menu { display: block; }
    .nav-links a:not(.active):hover,
    .dropdown-toggle:not(.active):hover { color: #B96794; }

    /* --- BLANK CONTENT AREA --- */
    .page-content {
      flex: 1;
    }

    /* --- FOOTER --- */
    footer {
      text-align: center;
      padding: 40px 20px;
      background: #fce8f5;
      border-top: 3px solid #e6c2d4;
    }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 900px) {
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
<body>
  <!-- Top banners -->
  <div class="full-width-banner">
    <!-- Replace these with your assets -->
    <img src="stupidassphoto.png" alt="Educate Donate Motto" class="motto-img">
  </div>

  <nav>
    <a href="index.html" class="home-btn">HOME</a>
    <div class="nav-links">
      <div class="dropdown">
        <a href="#" class="dropdown-toggle">About</a>
        <div class="dropdown-menu">
          <a href="socialmedia.html">Social Media Team</a>
          <a href="about.html">Executive Board</a>
          <a href="partnerships.html">Partnerships</a>
        </div>
      </div>
      <a href="events.html">Events</a>
      <a href="raregems.html" class="active">Rare Gems</a>
      <a href="newsletter.html">Newsletter</a>
      <a href="index.html#contact">Contact</a>
      <a href="getinvolved.html">Get Involved</a>
    </div>
  </nav>

  <!-- Intentionally blank page -->
  <div class="page-content"></div>

  <footer>
    <p>© <span id="year"></span> Rare Disease Club — Educate · Donate · Make An Impact</p>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
