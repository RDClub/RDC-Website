<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Newsletter - Rare Disease Club</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Georgia', serif;
      background-color: #fce8f5;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .full-width-banner {
      width: 100vw;
      background-color: #fce8f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px 0;
    }
    .full-width-banner img {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
    }
    .motto-img, .rdc-title-banner {
      max-width: 100%;
      margin: 0 auto 10px auto;
    }

    /* --- NAVIGATION --- */
    nav {
      background-color: #fce8f5;
      border-top: 3px solid black;
      border-bottom: 3px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      min-height: 72px;
      width: 100%;
      padding: 0;
    }
    .home-btn, .nav-links a, .dropdown-toggle {
      text-decoration: none;
      color: black;
      font-size: 1.35rem;
      font-weight: bold;
      font-family: 'Georgia', serif;
      text-transform: uppercase;
      transition: all 0.3s ease;
      padding: 0 32px;
      border: none;
      background: none;
      border-radius: 0;
      margin: 0;
      height: 72px;
      line-height: 72px;
      display: flex;
      align-items: center;
      box-sizing: border-box;
      cursor: pointer;
    }
    .home-btn.active,
    .nav-links a.active,
    .dropdown.active-parent .dropdown-toggle {
      background: white;
      color: black;
      border: 3px solid black;
      border-radius: 24px;
      padding: 0 32px;
      height: 56px;
      line-height: 56px;
      margin-left: 12px;
      font-size: 1.2rem;
    }
    .nav-links {
      display: flex;
      gap: 0;
      align-items: center;
      height: 72px;
    }
    .dropdown {
      position: relative;
      display: flex;
      align-items: center;
      height: 72px;
    }
    .dropdown-toggle:after {
      content: ' ▼';
      font-size: 0.8em;
      color: #19171a;
      margin-left: 2px;
    }
    .nav-links a[href="getinvolved.html"] { font-size: 1.35rem; }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 180px;
      background-color: #111;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.15);
      z-index: 99;
      flex-direction: column;
      padding: 0;
    }
    .dropdown-menu a {
      color: #fff;
      padding: 16px 26px;
      font-size: 1.15rem;
      border-bottom: 1px solid #222;
      background: none;
      border: none;
      border-radius: 0;
      margin: 0;
      height: auto;
      line-height: 1.6;
      display: block;
    }
    .dropdown-menu a:last-child { border-bottom: none; }
    .dropdown-menu a:hover,
    .dropdown-menu a:focus {
      background: #B96794;
      color: #fff;
    }
    .dropdown:hover .dropdown-menu,
    .dropdown.active .dropdown-menu {
      display: flex;
    }
    .nav-links a:not(.active):hover,
    .nav-links .dropdown-toggle:not(.active):hover {
      color: #B96794;
    }

    @media (max-width: 900px) {
      nav {
        flex-direction: column;
        min-height: auto;
      }
      .nav-links {
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        width: 100%;
      }
      .home-btn, .nav-links a, .dropdown-toggle {
        font-size: 1.25rem;
        height: 56px;
        line-height: 56px;
        padding: 0 16px;
        width: 100%;
        justify-content: flex-start;
      }
      .nav-links a[href="getinvolved.html"] { font-size: 1.25rem; }
      .home-btn.active,
      .nav-links a.active,
      .dropdown.active-parent .dropdown-toggle {
        margin-left: 0;
        border-radius: 18px;
      }
      .dropdown {
        height: 56px;
      }
      .dropdown-menu {
        position: static;
        min-width: 0;
        box-shadow: none;
        border-radius: 0;
        width: 100vw;
      }
    }
    @media (max-width: 600px) {
      html { font-size: 17px; }
      .home-btn, .nav-links a, .dropdown-toggle {
        font-size: 1rem;
        padding: 0 10px;
        height: 48px;
        line-height: 48px;
      }
      .nav-links a[href="getinvolved.html"] { font-size: 1rem; }
      .home-btn.active,
      .nav-links a.active,
      .dropdown.active-parent .dropdown-toggle {
        border-radius: 12px;
        height: 44px;
        line-height: 44px;
        font-size: 1rem;
      }
    }

    /* --- NEWSLETTER HERO --- */
    .newsletter-hero {
      width: 100vw;
      background: linear-gradient(135deg, #f9dff4 0%, #B96794 60%, #874c6e 100%);
      padding: 80px 20px;
      text-align: center;
      border-top: 3px solid #222;
    }
    .newsletter-hero h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      color: #fff;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    /* --- NEWSLETTER GRID --- */
    .newsletter-section {
      width: 100vw;
      background: #f4f0f2;
      padding: 60px 5vw 80px;
    }
    .newsletter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 36px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .newsletter-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 3 / 4;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .newsletter-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.22);
    }
    .newsletter-card img.card-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent 0%, rgba(0,0,0,0.78) 100%);
      padding: 60px 24px 28px;
      color: #fff;
    }
    .card-meta {
      font-size: 0.92rem;
      opacity: 0.85;
      margin-bottom: 10px;
      font-family: Georgia, serif;
    }
    .card-overlay h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.7rem;
      margin-bottom: 8px;
      line-height: 1.25;
    }
    .card-overlay p {
      font-size: 1rem;
      opacity: 0.88;
      line-height: 1.4;
    }

    @media (max-width: 600px) {
      .newsletter-grid {
        grid-template-columns: 1fr;
      }
      .newsletter-card {
        aspect-ratio: 3 / 4;
      }
      .card-overlay h2 { font-size: 1.35rem; }
    }

    .newsletter-card a {
      text-decoration: none;
      color: inherit;
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<!-- Full Width Banner -->
<div class="full-width-banner">
  <img src="stupidassphoto.png" alt="Educate Donate Motto" class="motto-img">
</div>

<!-- Navigation -->
<nav>
  <a href="index.html" class="home-btn">HOME</a>
  <div class="nav-links">
    <div class="dropdown">
      <a href="#" class="dropdown-toggle">About</a>
      <div class="dropdown-menu">
        <a href="socialmedia.html">Social Media Team</a>
        <a href="about.html">Executive Board</a>
        <a href="chapters.html">Chapters</a>
        <a href="partnerships.html">Partnerships</a>
      </div>
    </div>
    <a href="events.html">Events</a>
    <a href="raregems.html">Rare Gems</a>
    <a href="newsletter.html" class="active">Newsletter</a>
    <a href="index.html#contact">Contact</a>
    <a href="getinvolved.html">Get Involved</a>
  </div>
</nav>

<!-- NEWSLETTER HERO -->
<section class="newsletter-hero">
  <h1>Our Newsletters</h1>
</section>

<!-- NEWSLETTER GRID -->
<section class="newsletter-section">
  <div class="newsletter-grid">

    <!-- January Issue -->
    <div class="newsletter-card">
      <a href="newsletter-jan.html">
        <img src="pic.png" alt="January Issue - RDC Newsletter" class="card-cover">
        <div class="card-overlay">
          <div class="card-meta">RDC Newsletter &middot; January 2026</div>
          <h2>January Issue</h2>
          <p>What is Rare Disease Club? &middot; Fanconi Anemia</p>
        </div>
      </a>
    </div>

  </div>
</section>

<script>
  // Enable About dropdown for mobile
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.dropdown-toggle').forEach(function(toggle) {
      toggle.addEventListener('click', function(e) {
        if(window.innerWidth <= 900) {
          e.preventDefault();
          const dropdown = this.parentElement;
          dropdown.classList.toggle('active');
        }
      });
    });
    document.addEventListener('click', function(e) {
      document.querySelectorAll('.dropdown.active').forEach(function(drop) {
        if (!drop.contains(e.target)) drop.classList.remove('active');
      });
    });
  });
</script>
</body>
</html>
